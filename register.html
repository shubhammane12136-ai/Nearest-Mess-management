<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SmartMess</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
</head>

<body
    style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; overflow: hidden; background: linear-gradient(135deg, #F8F9FA 0%, #E9ECEF 100%);">

    <!-- Playful Background Shapes -->
    <div class="bg-shape shape-1"
        style="width: 500px; height: 500px; top: -150px; left: -150px; animation-duration: 20s;"></div>
    <div class="bg-shape shape-2"
        style="width: 600px; height: 600px; bottom: -200px; right: -200px; background: rgba(78, 205, 196, 0.3);"></div>
    <div class="bg-shape"
        style="width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255, 230, 109, 0.4); z-index: -2;">
    </div>

    <div class="animate-pop-in" style="max-width: 500px; width: 100%; position: relative; z-index: 10;">
        <div
            style="background: white; border-radius: var(--radius-xl); padding: 40px; box-shadow: var(--shadow-hover); border: 2px solid rgba(255, 107, 107, 0.1);">

            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <button class="theme-toggle" onclick="window.toggleTheme()" title="Toggle Dark/Light Mode"
                    style="position: absolute; top: 20px; right: 20px;">
                    <i class="fas fa-moon" style="color: #2A363B;"></i>
                </button>
            </div>

            <div style="text-align: center; margin-bottom: 25px;">
                <a href="index.html" class="logo" style="justify-content: center; font-size: 2.25rem;">
                    <i class="fas fa-pizza-slice"></i> SmartMess
                </a>
                <h2 style="margin-top: 10px; font-weight: 800; font-size: 1.6rem;">Join the Community! 🚀</h2>
                <p style="color: var(--text-gray); font-weight: 600; margin-top: 5px; font-size: 0.95rem;">Delicious
                    food discovery starts here.</p>
            </div>

            <form id="register-form">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label class="form-label" style="text-align: center;">I am joining as a...</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <label class="lively-role-card">
                            <input type="radio" name="role" value="student" required checked>
                            <div class="role-content">
                                <i class="fas fa-user-graduate"></i>
                                <span>Hungry Student</span>
                            </div>
                        </label>
                        <label class="lively-role-card">
                            <input type="radio" name="role" value="owner" required>
                            <div class="role-content">
                                <i class="fas fa-store"></i>
                                <span>Mess Owner</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1rem;">
                    <label class="form-label"><i class="fas fa-user-circle"
                            style="color: var(--primary); margin-right: 6px;"></i> Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Jane Doe" required>
                </div>

                <div class="form-group" style="margin-bottom: 1rem;">
                    <label class="form-label"><i class="fas fa-envelope"
                            style="color: var(--primary); margin-right: 6px;"></i> Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@student.com" required>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="form-label"><i class="fas fa-key"
                            style="color: var(--primary); margin-right: 6px;"></i> Create Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required
                        minlength="6">
                </div>

                <button type="submit" id="reg-btn" class="btn btn-primary"
                    style="width: 100%; height: 50px; font-size: 1.1rem; border-radius: var(--radius-md);">
                    Create My Account <i class="fas fa-rocket" style="margin-left: 5px;"></i>
                </button>
            </form>

            <p
                style="text-align: center; margin-top: 25px; font-weight: 700; color: var(--text-gray); font-size: 0.95rem;">
                Already a member? <a href="login.html" style="color: var(--secondary); text-decoration: none;">Sign
                    In</a>
            </p>
        </div>
    </div>

    <style>
        .lively-role-card {
            cursor: pointer;
            position: relative;
            display: block;
        }

        .lively-role-card input {
            display: none;
        }

        .role-content {
            background: #F8F9FA;
            border: 2px solid #E9ECEF;
            border-radius: var(--radius-lg);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: var(--text-gray);
            font-weight: 800;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.95rem;
        }

        .role-content i {
            font-size: 2rem;
            color: #CED4DA;
            transition: 0.3s;
        }

        .lively-role-card:hover .role-content {
            transform: translateY(-5px);
            box-shadow: var(--shadow-soft);
        }

        .lively-role-card input:checked+.role-content {
            background: rgba(255, 107, 107, 0.05);
            border-color: var(--primary);
            color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.15);
        }

        .lively-role-card input:checked+.role-content i {
            color: var(--primary);
        }
    </style>

    <!-- AOS Animation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // Pre-select role based on URL
        const params = new URLSearchParams(window.location.search);
        const roleParam = params.get('role');
        if (roleParam === 'owner' || roleParam === 'student') {
            document.querySelector(`input[name="role"][value="${roleParam}"]`).checked = true;
        }
    </script>

    <script type="module">
        import { authService } from './js/auth.js';
        import { uiService } from './js/ui.js';

        const form = document.getElementById('register-form');
        const btn = document.getElementById('reg-btn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Finalizing setup...';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // 1. Capture Selected Role
            const role = document.querySelector('input[name="role"]:checked').value;

            try {
                // 2. Perform Supabase Signup + Profile Insertion
                await authService.register(email, password, role, name);

                uiService.showToast("Account ready! Let's get started. 🚀");

                // 3. Simple Redirection path
                setTimeout(() => {
                    if (role === 'owner') {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'student-dashboard.html';
                    }
                }, 1200);

            } catch (err) {
                uiService.showToast(err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Create My Account <i class="fas fa-rocket" style="margin-left: 5px;"></i>';
            }
        };
    </script>
</body>

</html>
